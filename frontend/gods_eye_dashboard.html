// ─── Seeded RNG ───────────────────────────────────────────────────────────────
function mkRng(seed) {
  let s = (seed >>> 0) || 1;
  return function() {
    s |= 0; s = s + 0x6D2B79F5 | 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = t + Math.imul(t ^ (t >>> 7), 61 | t) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function gauss(r, mu, sd) {
  const u = Math.max(1e-10, 1 - r()), v = r();
  return mu + sd * Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

// ─── Weighted Probability ─────────────────────────────────────────────────────
function wp(base) {
  let p = base;
  return {
    esc(cond, m) { if (cond && m > 1) p *= m; return this; },
    sup(cond, m) { if (cond && m >= 0 && m < 1) p *= m; return this; },
    cap(mx)      { p = Math.min(p, mx); return this; },
    roll(r)      { return r() < Math.max(0, Math.min(1, p)); },
    val()        { return Math.max(0, Math.min(1, p)); }
  };
}

function norm(s) {
  const t = s.pA + s.pB + s.pC + s.pD + s.pE;
  if (!t) return;
  s.pA = Math.max(0.01, s.pA/t); s.pB = Math.max(0.01, s.pB/t);
  s.pC = Math.max(0.01, s.pC/t); s.pD = Math.max(0.01, s.pD/t);
  s.pE = Math.max(0.01, s.pE/t);
}

  const p = {
    hikeWk: Math.max(1, 1 + Math.round(gauss(r, 0, 1))),
    hikeP: Math.min(0.97, Math.max(0.5, gauss(r, params.bojP, 0.07))),
    genWk: 6 + Math.floor(r() * 14),
    mineP: r() * 0.025 + 0.015,
    ilP:   r() * 0.014 + 0.008,
    babP:  (r() * 0.025 + 0.020) * params.houth,
    mediP: r() * 0.05  + 0.04,
    gateP: r() * 0.02  + 0.015,
    tetP:  r() * 0.009 + 0.006,
  };

  const hist = [];
  let s = mkState();
  hist.push(Object.assign({}, s));

  let hikeFired=false, hikeWkA=null, uwFired=false, ustDist=false, gates=2;

  for (let w=1; w<=29; w++) {

        s.unwind = true;
        s.l2 = Math.min(1, s.l2+0.02);
        s.pB = Math.min(0.90, s.pB+0.15); s.pC -= 0.05;
        norm(s); s.evts = s.evts.concat(['BOJ_HIKE']);
      }
    }

    // Carry unwind (1-2 wks after hike)
    if (hikeFired && !uwFired) {
      const lag = w - hikeWkA;
      const up = lag===1 ? 0.70 : lag>=2 ? 0.90 : 0;
      if (up > 0 && r() < up) {
        uwFired = true;
        s.vix = Math.min(90, s.vix + 58);
        s.yld += 0.67; s.jpy -= r()*7+4;
        s.l2 = Math.min(1, s.l2+0.03);
        s.evts = s.evts.concat(['CARRY_UNWIND']);
        if (s.vix > 40 && !s.crash) {
          s.crash = true;
          s.l3 = Math.min(1, s.l3+0.08);
          s.pB = Math.min(0.95, s.pB+0.20); norm(s);
          s.evts = s.evts.concat(['FLASH_CRASH']);

      }
    }
    if (hikeFired && uwFired && !ustDist) {
      ustDist = true;
      s.ticSell = true; s.l2 = Math.min(1, s.l2+0.03); s.yld += 0.15;
      s.evts = s.evts.concat(['TIC_SELL']);
    }

    // Fed cut
    if (!s.fedCut && s.crash && r() < 0.55) {
      s.fedCut = true; s.vix = Math.max(15, s.vix-12); s.yld -= 0.20;
      s.evts = s.evts.concat(['FED_CUT']);

    // IRGC mines
    if (!s.mines) {
      if (wp(p.mineP).esc(s.israel,4.5).esc(s.brent<80,2.5).esc(s.crash,1.5)
         .sup(s.pgsa,0.30).sup(s.ceasefire,0.15).sup(!s.israel&&w<6,0.50).cap(0.20).roll(r)) {
        s.mines = true;
        s.brent += r()*35+25; s.l1=Math.min(1,s.l1+0.005); s.l8=Math.min(1,s.l8+0.05);
        s.pD=Math.min(0.75,s.pD+0.35); s.pC-=0.15; s.pB-=0.10; norm(s);
        s.evts = s.evts.concat(['IRGC_MINES']);
      }
    }

    // Israel
    if (!s.israel) {
      if (wp(p.ilP).esc(s.mines,3.5).esc(w>12,1.8).sup(s.ceasefire,0.20)
         .sup(s.crash,0.50).sup(w<=3,0.40).cap(0.12).roll(r)) {
        s.israel = true;
        s.brent += r()*20+15; s.vix=Math.min(80,s.vix+18); s.l1=Math.min(1,s.l1+0.005);
        s.l6=Math.min(1,s.l6+0.10);
        s.pA=Math.min(0.70,s.pA+0.28); s.pC-=0.12; s.pB-=0.08; norm(s);
        s.evts = s.evts.concat(['ISRAEL']);
      }
    }

    // Houthis / Bab al-Mandab
    if (!s.bab) {
      const decl = s.babDecl && w>=2 ? 1.6 : 1.0;
      if (wp(p.babP).esc(s.mines,3.5).esc(s.israel,2.5).esc(decl>1,decl)
         .esc(w>8,1.6).sup(w<2&&!s.babDecl,0.15)
         .sup(s.ceasefire&&params.cSup<1.0,0.30).sup(s.pC>0.4,0.25).cap(0.18).roll(r)) {
        s.bab = true;
        s.brent += r()*35+20; s.l8=Math.min(1,s.l8+0.06);
        s.pE=Math.min(0.65,s.pE+0.25); s.pB-=0.08; s.pC-=0.10; norm(s);
        s.evts = s.evts.concat(['BAB_MANDAB']);
      }
    }

    // Yanbu
    if (!s.yanbu && s.bab) {
      if (wp(0.005).esc(s.bab,4.0).cap(0.08).roll(r)) {
        s.yanbu = true;
        s.brent += r()*60+40;
        s.pE=Math.min(0.85,s.pE+0.40); norm(s);
        s.evts = s.evts.concat(['YANBU']);
      }
    }

    // Ceasefire
    if (!s.ceasefire) {
      if (wp(p.mediP).esc(s.brent>125,1.8).sup(s.mines||s.bab,0.20).cap(0.12).roll(r)) {
        s.ceasefire = true;
        s.yld -= 0.12; s.brent -= r()*10+5; s.l1=Math.max(0.45,s.l1-0.08);
        s.pC=Math.min(0.60,s.pC+0.18); s.pB-=0.08; s.pA-=0.05; norm(s);
        s.evts = s.evts.concat(['CEASEFIRE']);
      }
    } else if (r() < 0.20) {
      s.ceasefire = false;
      s.yld += 0.15; s.brent += r()*8+4; s.l1=Math.min(1,s.l1+0.05);
      s.pC=Math.max(0.05,s.pC-0.10); s.pB+=0.05; norm(s);
      s.evts = s.evts.concat(['CF_COLLAPSE']);
    }

    // Saudi peg
    if (!s.saudiPeg) {
      if (wp(0.008).esc(s.crash,3.5).esc(s.ticSell,2.0).sup(!s.crash,0.30)
         .sup(s.ceasefire,0.40).cap(0.06).roll(r)) {
        s.saudiPeg = true; s.l2=Math.min(1,s.l2+0.12);
        s.evts = s.evts.concat(['SAUDI_PEG']);
      }
    }

    // Credit cascade
    if (!s.cascade) {
      if (wp(p.gateP).esc(s.crash,4.5).esc(s.brent>130,2.0).esc(s.vix>45,2.5)
         .sup(s.fedCut,0.45).sup(w<8,0.50).cap(0.07).roll(r)) {
        gates++;
        if (gates >= 3) {
          s.cascade = true; s.l3=Math.min(1,s.l3+0.12); s.vix=Math.min(85,s.vix+12);
          s.evts = s.evts.concat(['CASCADE']);
        } else {
          s.l3=Math.min(1,s.l3+0.05);
          s.evts = s.evts.concat(['GATE']);
        }
      }
    }

    // Tether
    if (!s.tether) {
      if (wp(p.tetP).esc(s.crash,8.0).esc(s.cascade,4.0).esc(s.vix>55,3.0)
         .sup(s.genius,0.40).sup(!s.crash,0.12).cap(0.025).roll(r)) {
        s.tether = true; s.l4=Math.min(1,s.l4+0.10);
        s.evts = s.evts.concat(['TETHER']);
      }
    }

    // Genius Act
    if (!s.genius && w===p.genWk && r()<0.68) {
      s.genius = true; s.l4=Math.min(1,s.l4+0.15);
      s.evts = s.evts.concat(['GENIUS']);
    }

    // SPR draw
    const dr = s.spr>380?8.5:s.spr>350?7.5:s.spr>330?5.0:1.5;
    s.spr = Math.max(273, s.spr - dr);
    if (s.spr<=330 && !s.sprFloor) {
      s.sprFloor = true; s.brent += r()*14+6;
      s.evts = s.evts.concat(['SPR_FLOOR']);
    }

    // Macro drift
    const bt = s.yanbu?215:s.bab&&s.mines?185:s.bab?165:s.mines?155:s.ceasefire?96:s.pC>0.4?98:120;
    s.brent += (bt-s.brent)*0.08 + (r()-0.5)*6;
    s.brent = Math.max(55, Math.min(250, s.brent));
    const vt = s.crash?(s.cascade?42:35):18;
    s.vix += (vt-s.vix)*0.12 + (r()-0.5)*3;
    s.vix = Math.max(12, Math.min(90, s.vix));
    s.jpy += s.bojHiked ? gauss(r,-0.3,0.8) : gauss(r,0.1,0.5);
    s.jpy = Math.max(130, Math.min(170, s.jpy));
    s.yld += (s.crash?5.5:4.8 - s.yld)*0.05 + (r()-0.5)*0.16;
    s.yld = Math.max(3, Math.min(9, s.yld));
    for (const k of ['l1','l2','l3','l4','l5','l6','l7','l8','l9'])
      s[k] = Math.max(0, Math.min(1, s[k]));
    norm(s);
    hist.push(Object.assign({}, s));
  }
  return hist;
}

// ─── Gaussian Mixture Model (EM, diagonal covariance, BIC selection) ─────────
function dist2(a,b){ return a.reduce((s,v,i)=>s+(v-b[i])*(v-b[i]),0); }

// Diagonal GMM: params per component = (d means + d variances + 1 weight) = 2d+1
// BIC = -2*logL + (k*(2d+1) - 1) * ln(n)
function gmm(data, k, maxIter=80) {
  const n=data.length, d=data[0].length;
  const eps=1e-8;

  // K-Means++ init for means
  const means=[];
  means.push(data[Math.floor(Math.random()*n)].slice());
  while(means.length<k){
    const ds=data.map(pt=>Math.min(...means.map(c=>dist2(pt,c))));
    const tot=ds.reduce((a,b)=>a+b,0);
    let rv=Math.random()*tot,idx=0;
    for(;idx<n-1&&(rv-=ds[idx])>0;idx++);
    means.push(data[idx].slice());
  }

  // Init variances (global variance per dim), uniform weights
  const allMu=Array(d).fill(0).map((_,di)=>data.reduce((s,r)=>s+r[di],0)/n);
  let vars=means.map(()=>Array(d).fill(0).map((_,di)=>
    data.reduce((s,r)=>s+(r[di]-allMu[di])**2,0)/n+1e-2
  ));
  let weights=Array(k).fill(1/k);

  // EM iterations
  let R=Array(n).fill(null).map(()=>Array(k).fill(1/k));
  let logL=-Infinity;

  for(let it=0;it<maxIter;it++){
    // E-step: compute responsibilities
    const logResp=Array(n).fill(null).map(()=>Array(k).fill(0));
    for(let i=0;i<n;i++){
      for(let j=0;j<k;j++){
        let ll=Math.log(weights[j]+eps);
        for(let di=0;di<d;di++){
          const v=vars[j][di];
          ll -= 0.5*(Math.log(2*Math.PI*v+eps) + (data[i][di]-means[j][di])**2/(v+eps));
        }
        logResp[i][j]=ll;
      }
      // Log-sum-exp for numerical stability
      const mx=Math.max(...logResp[i]);
      const lse=mx+Math.log(logResp[i].reduce((s,v)=>s+Math.exp(v-mx),0));
      for(let j=0;j<k;j++) R[i][j]=Math.exp(logResp[i][j]-lse);
    }

    // M-step: update params
    const Nk=Array(k).fill(0).map((_,j)=>R.reduce((s,ri)=>s+ri[j],0));
    for(let j=0;j<k;j++){
      if(Nk[j]<eps){weights[j]=eps/k;continue;}
      weights[j]=Nk[j]/n;
      means[j]=Array(d).fill(0).map((_,di)=>R.reduce((s,ri,i)=>s+ri[j]*data[i][di],0)/Nk[j]);
      vars[j]=Array(d).fill(0).map((_,di)=>
        Math.max(eps, R.reduce((s,ri,i)=>s+ri[j]*(data[i][di]-means[j][di])**2,0)/Nk[j])
      );
    }

    // Log-likelihood check for convergence
    let newLL=0;
    for(let i=0;i<n;i++){
      let s=0;
      for(let j=0;j<k;j++){
        let ll=Math.log(weights[j]+eps);
        for(let di=0;di<d;di++){
          const v=vars[j][di];
          ll-=0.5*(Math.log(2*Math.PI*v+eps)+(data[i][di]-means[j][di])**2/(v+eps));
        }
        s+=Math.exp(ll);
      }
      newLL+=Math.log(s+eps);
    }
    if(Math.abs(newLL-logL)<1e-4) break;
    logL=newLL;
  }

  const labels=R.map(ri=>{let b=0;for(let j=1;j<k;j++) if(ri[j]>ri[b]) b=j; return b;});
  const bic=-2*logL+(k*(2*d+1)-1)*Math.log(n);

  // Entropy-based uncertainty
  const entropies=R.map(ri=>{
    const h=-ri.reduce((s,p)=>s+(p>eps?p*Math.log(p):0),0);
    return h/Math.log(k);
  });
  const uncertainty=entropies.reduce((a,b)=>a+b,0)/n;

  return {labels,R,means,vars,weights,bic,logL,uncertainty};
}

function gmmBIC(data, kRange) {
  // Run gmm for each k, pick by minimum BIC
  let best=null, bestBic=Infinity;
  const bicMap={};
  for(const k of kRange){
    let bestRun=null, bestRunBic=Infinity;
    for(let t=0;t<3;t++){
      const r=gmm(data,k);
      if(r.bic<bestRunBic){bestRunBic=r.bic;bestRun=r;}
    }
    bicMap[k]=+bestRun.bic.toFixed(0);
    if(bestRun.bic<bestBic){bestBic=bestRun.bic;best=bestRun;best.k=k;}
  }
  return {result:best, bicMap};
}

function silScore(data,labels) {
  const n=Math.min(data.length,200);
  let tot=0;
  for(let i=0;i<n;i++){
    const ci=labels[i];
    const same=data.filter((_,j)=>j!==i&&labels[j]===ci);
    const a=same.length?same.reduce((s,pt)=>s+Math.sqrt(dist2(data[i],pt)),0)/same.length:0;
    const ks=[...new Set(labels)].filter(c=>c!==ci);
    if(!ks.length){tot+=0;continue;}
    const b=Math.min(...ks.map(c=>{
      const pts=data.filter((_,j)=>labels[j]===c);
      return pts.length?pts.reduce((s,pt)=>s+Math.sqrt(dist2(data[i],pt)),0)/pts.length:Infinity;
    }));
    tot+=(b-a)/Math.max(a,b)||0;
  }
  return tot/n;
}

function pca2(data) {
  const n=data.length,d=data[0].length;
  const mu=Array(d).fill(0).map((_,i)=>data.reduce((s,r)=>s+r[i],0)/n);
  const X=data.map(r=>r.map((v,i)=>v-mu[i]));
  const pc=function(blocked) {
    let v=Array(d).fill(0).map(()=>Math.random()-.5);
    for(const b of blocked){const dot=v.reduce((s,vi,i)=>s+vi*b[i],0);v=v.map((vi,i)=>vi-dot*b[i]);}
    let len=Math.sqrt(v.reduce((s,vi)=>s+vi*vi,0)); v=v.map(vi=>vi/len);
    for(let it=0;it<60;it++){
      let nv=Array(d).fill(0);
      for(const row of X){const dot=row.reduce((s,vi,i)=>s+vi*v[i],0);for(let i=0;i<d;i++) nv[i]+=dot*row[i];}
      for(const b of blocked){const dot=nv.reduce((s,vi,i)=>s+vi*b[i],0);nv=nv.map((vi,i)=>vi-dot*b[i]);}
      len=Math.sqrt(nv.reduce((s,vi)=>s+vi*vi,0));v=nv.map(vi=>vi/len);
    }
    return v;
  };
  const p1=pc([]),p2=pc([p1]);
  return X.map(row=>[row.reduce((s,v,i)=>s+v*p1[i],0),row.reduce((s,v,i)=>s+v*p2[i],0)]);
}

function stdize(mx) {
  const n=mx.length,d=mx[0].length;
  const mu=Array(d).fill(0).map((_,i)=>mx.reduce((s,r)=>s+r[i],0)/n);
  const sd=Array(d).fill(0).map((_,i)=>Math.sqrt(mx.reduce((s,r)=>s+(r[i]-mu[i])**2,0)/n)||1);
  return mx.map(r=>r.map((v,i)=>(v-mu[i])/sd[i]));
}

function feats(hist) {
  const f=hist[hist.length-1];
  const m=hist[Math.floor(hist.length/2)]||f;
  return [
    f.l1,f.l2,f.l3,f.l4,f.l5,f.l6,f.l7,f.l8,f.l9,
    f.brent/200,f.vix/90,(f.jpy-130)/40,f.yld/9,f.spr/415,
    +f.crash,+f.bab,+f.mines,+f.israel,+f.ceasefire,+f.cascade,+f.saudiPeg,+f.tether,+f.genius,+f.yanbu,
    f.pA,f.pB,f.pC,f.pD,f.pE,
    m.brent/200,m.vix/90,+m.crash
  ];
}

function regimelabel(r) {
  if (r.avgBrent > 185) return 'Dual Chokepoint — Extreme Supply Shock';
  if (r.flashR > 0.80 && r.babR < 0.20 && r.mineR < 0.20) return 'Financial Cascade — BOJ Flash Crash';
  if (r.cfR > 0.70 && r.flashR < 0.25) return 'Diplomatic Resolution — Scenario C Path';
  if (r.mineR > 0.50 && r.babR < 0.40) return 'Physical Hormuz Closure — Scenario D';
  if (r.flashR > 0.70 && r.avgBrent > 155) return 'Synchronized Crisis — Finance + Energy';
  if (r.flashR > 0.60 && r.babR > 0.50) return 'Full Escalation — All Legs Active';
  if (r.flashR < 0.20) return 'Prolonged Duration — No Flash Crash Path';
  return 'Mixed Escalation — Partial Resolution';
}

// ─── Aggregate ───────────────────────────────────────────────────────────────
function aggregate(hists) {
  const N=hists.length, W=30;
  const LEGS=['l1','l2','l3','l4','l5','l6','l7','l8','l9'];
  const SCENS=['A','B','C','D','E'];

  // Timeline
  const tl=Array(W).fill(null).map((_,w)=>{
    const row={w};
    for(const s of SCENS){
      const vals=hists.map(h=>{const ws=h[Math.min(w,h.length-1)];return ws['p'+s]||0;});
      row['p'+s]=vals.reduce((a,b)=>a+b,0)/N;
    }
    for(const l of LEGS){
      const vals=hists.map(h=>h[Math.min(w,h.length-1)][l]||0);
      row[l]=vals.reduce((a,b)=>a+b,0)/N;
    }
    row.brent=hists.map(h=>h[Math.min(w,h.length-1)].brent).reduce((a,b)=>a+b,0)/N;
    row.vix=hists.map(h=>h[Math.min(w,h.length-1)].vix).reduce((a,b)=>a+b,0)/N;
    return row;
  });

  // Event freq
  const EVTS=['BOJ_HIKE','FLASH_CRASH','BAB_MANDAB','IRGC_MINES','ISRAEL','CEASEFIRE','CASCADE','TETHER','SPR_FLOOR','GENIUS','SAUDI_PEG','YANBU'];
  const evtF={};
  for(const e of EVTS) evtF[e]=0;
  for(const h of hists){
    const seen=new Set(h.flatMap(w=>w.evts||[]));
    for(const e of EVTS) if(seen.has(e)) evtF[e]++;
  }
  for(const e of EVTS) evtF[e]=evtF[e]/N;

  // Flash crash timing
  const crashWks=[];
  for(const h of hists) for(let w=0;w<h.length;w++) if((h[w].evts||[]).includes('FLASH_CRASH')){crashWks.push(w);break;}
  const crashDist=Array(30).fill(0);
  for(const w of crashWks) if(w<30) crashDist[w]++;

  // Final scenarios + CI bands (5th/95th percentile)
  const fScen={}, fCI={};
  for(const s of SCENS){
    const vals=hists.map(h=>h[h.length-1]['p'+s]||0).sort(function(a,b){return a-b;});
    fScen[s]=vals.reduce(function(a,b){return a+b;},0)/N;
    fCI[s]={lo:vals[Math.floor(N*0.05)], hi:vals[Math.floor(N*0.95)]};
  }

  // Timeline with CI bands per scenario
  for(let wi=0;wi<tl.length;wi++){
    for(const s of SCENS){
      const wvals=hists.map(function(h){return h[Math.min(wi,h.length-1)]['p'+s]||0;}).sort(function(a,b){return a-b;});
      tl[wi]['p'+s+'lo']=wvals[Math.floor(N*0.05)];
      tl[wi]['p'+s+'hi']=wvals[Math.floor(N*0.95)];
    }
  }

  // Leg score correlation matrix (Pearson on final states)
  const LEGS=['l1','l2','l3','l4','l5','l6','l7','l8','l9'];
  const finalLegVals={};
  for(const l of LEGS) finalLegVals[l]=hists.map(function(h){return h[h.length-1][l]||0;});
  const legMeans={};
  for(const l of LEGS) legMeans[l]=finalLegVals[l].reduce(function(a,b){return a+b;},0)/N;
  const corrMatrix={};
  for(const a of LEGS){
    corrMatrix[a]={};
    for(const b of LEGS){
      if(a===b){corrMatrix[a][b]=1.0;continue;}
      const ax=finalLegVals[a], bx=finalLegVals[b];
      const ma=legMeans[a], mb=legMeans[b];
      let num=0,da=0,db=0;
      for(let i=0;i<N;i++){num+=(ax[i]-ma)*(bx[i]-mb);da+=(ax[i]-ma)**2;db+=(bx[i]-mb)**2;}
      corrMatrix[a][b]=da&&db?num/Math.sqrt(da*db):0;
    }
  }

  // GMM Regime discovery (BIC model selection)
  const fvecs=hists.map(feats);
  const scaled=stdize(fvecs);
  const {result:gmmRes, bicMap}=gmmBIC(scaled,[2,3,4,5,6]);
  const bestK=gmmRes.k;
  const labels=gmmRes.labels;
  const responsibilities=gmmRes.R;
  const uncertainty=gmmRes.uncertainty;
  const sil=silScore(scaled,labels);
  const coords=pca2(scaled);

  const regimes={};
  for(let ci=0;ci<bestK;ci++){
    const idxs=labels.map((l,i)=>l===ci?i:-1).filter(i=>i>=0);
    if(!idxs.length)continue;
    const fs=idxs.map(i=>hists[i][hists[i].length-1]);
    const avg=f=>fs.reduce((s,h)=>s+f(h),0)/fs.length;
    const rt=f=>fs.filter(f).length/fs.length;
    // Soft membership: mean responsibility for this cluster
    const meanResp=idxs.reduce((s,i)=>s+responsibilities[i][ci],0)/idxs.length;
    const r={
      n:fs.length, pct:fs.length/N,
      avgBrent:avg(h=>h.brent), avgVix:avg(h=>h.vix), avgYld:avg(h=>h.yld),
      flashR:rt(h=>h.crash), babR:rt(h=>h.bab), mineR:rt(h=>h.mines),
      ilR:rt(h=>h.israel), cfR:rt(h=>h.ceasefire), casR:rt(h=>h.cascade), sauR:rt(h=>h.saudiPeg),
      meanResp:+meanResp.toFixed(3),
      gmmWeight:+gmmRes.weights[ci].toFixed(3),
    };
    r.label=regimelabel(r);
    regimes[ci]=r;
  }

  // 2D covariance ellipses for PCA scatter (using diagonal vars projected to PCA)
  // Approximate: draw circle scaled by mean sqrt(variance) per component in PCA space
  const coords2d=pca2(scaled);
  const ellipses=Array(bestK).fill(null).map((_,ci)=>{
    const idxs=labels.map((l,i)=>l===ci?i:-1).filter(i=>i>=0);
    if(!idxs.length) return null;
    const xs=idxs.map(i=>coords2d[i][0]), ys=idxs.map(i=>coords2d[i][1]);
    const mx=xs.reduce((a,b)=>a+b,0)/xs.length, my=ys.reduce((a,b)=>a+b,0)/ys.length;
    const sx=Math.sqrt(xs.reduce((s,v)=>s+(v-mx)**2,0)/xs.length)||0.5;
    const sy=Math.sqrt(ys.reduce((s,v)=>s+(v-my)**2,0)/ys.length)||0.5;
    return {cx:+mx.toFixed(3),cy:+my.toFixed(3),rx:+(2*sx).toFixed(3),ry:+(2*sy).toFixed(3)};
  });

  const pcaCoords=coords2d.map((c,i)=>({
    x:+c[0].toFixed(3),y:+c[1].toFixed(3),k:labels[i],
    probs:responsibilities[i].map(p=>+p.toFixed(3))
  }));

  return {tl,evtF,fScen,fCI,crashDist,crashWks,regimes,bestK,bicMap,sil,uncertainty,ellipses,pcaCoords,N,corrMatrix};
}

// ─── SVG Chart helpers ────────────────────────────────────────────────────────
function SvgAreaChart({data,keys,colors,height=180}) {
  const W=560,H=height,PL=36,PR=8,PT=6,PB=22;
  const iW=W-PL-PR, iH=H-PT-PB;
  const n=data.length;
  const xScale=i=>(i/(n-1))*iW+PL;
  const yScale=v=>PT+iH*(1-v);

  // stack
  const stacked=data.map(row=>{
    const layers=[];
    let acc=0;
    for(const k of keys){acc+=row[k]||0;layers.push(acc);}
    return layers;
  });

  const area=(ki)=>{
    const pts=data.map((_, i)=>({
      x:xScale(i),
      y:yScale(stacked[i][ki]),
      y0:yScale(ki>0?stacked[i][ki-1]:0)
    }));
    let d=`M${pts[0].x},${pts[0].y0}`;
    d+=pts.map(p=>`L${p.x},${p.y}`).join('');
    d+=`L${pts[pts.length-1].x},${pts[pts.length-1].y0}`;
    d+=pts.slice().reverse().map(p=>`L${p.x},${p.y0}`).join('');
    d+='Z';
    return d;
  };

  const yticks=[0,.25,.5,.75,1];

  return (
    <svg viewBox={"0 0 "+W+" "+H} style={{width:'100%',height:H}}>
      {yticks.map(v=>(
        <g key={v}>
          <line x1={PL} y1={yScale(v)} x2={W-PR} y2={yScale(v)} stroke="#1e2938" strokeWidth={0.5}/>
          <text x={PL-4} y={yScale(v)+3} fontSize={8} fill="#374151" textAnchor="end">{(v*100).toFixed(0)}%</text>
        </g>
      ))}
      {keys.map((k,ki)=>(
        <path key={k} d={area(ki)} fill={colors[ki]} opacity={0.75}/>
      ))}
      {[0,5,10,15,20,25,29].map(i=>(
        <text key={i} x={xScale(i)} y={H-4} fontSize={8} fill="#374151" textAnchor="middle">W{i}</text>
      ))}
    </svg>
  );
}

function SvgLineChart({data,keys,colors,height=160,domainMin,domainMax}) {
  const W=560,H=height,PL=36,PR=8,PT=6,PB=22;
  const iW=W-PL-PR, iH=H-PT-PB;
  const n=data.length;
  const allVals=data.flatMap(row=>keys.map(k=>row[k]||0));
  const vMin=domainMin!==undefined?domainMin:Math.min(...allVals);
  const vMax=domainMax!==undefined?domainMax:Math.max(...allVals);
  const xScale=i=>(i/(n-1))*iW+PL;
  const yScale=v=>PT+iH*(1-(v-vMin)/(vMax-vMin||1));

  const line=k=>{
    const pts=data.map((_,i)=>xScale(i)+','+yScale(data[i][k]||0));
    return 'M'+pts.join('L');
  };

  return (
    <svg viewBox={"0 0 "+W+" "+H} style={{width:'100%',height:H}}>
      {[0,.25,.5,.75,1].map(t=>{
        const v=vMin+(vMax-vMin)*t;
        return <g key={t}>
          <line x1={PL} y1={yScale(v)} x2={W-PR} y2={yScale(v)} stroke="#1e2938" strokeWidth={0.5}/>
          <text x={PL-4} y={yScale(v)+3} fontSize={8} fill="#374151" textAnchor="end">{v.toFixed(1)}</text>
        </g>;
      })}
      {keys.map((k,ki)=>(
        <path key={k} d={line(k)} fill="none" stroke={colors[ki]} strokeWidth={1.8} opacity={0.9}/>
      ))}
      {[0,5,10,15,20,25,29].map(i=>(
        <text key={i} x={xScale(i)} y={H-4} fontSize={8} fill="#374151" textAnchor="middle">W{i}</text>
      ))}
    </svg>
  );
}

function PcaScatter({coords,k,ellipses}) {
  const W=360,H=260,PAD=20;
  if(!coords||!coords.length) return null;
  const xs=coords.map(p=>p.x),ys=coords.map(p=>p.y);
  const xMin=Math.min(...xs),xMax=Math.max(...xs);
  const yMin=Math.min(...ys),yMax=Math.max(...ys);
  const xr=xMax-xMin||1, yr=yMax-yMin||1;
  const px=v=>PAD+(v-xMin)/xr*(W-PAD*2);
  const py=v=>PAD+(yMax-v)/yr*(H-PAD*2);
  const COLS=['#3b82f6','#ef4444','#22c55e','#f97316','#a855f7','#ec4899'];
  // Scale radii from data-space to svg-space
  const rxScale=r=>r/xr*(W-PAD*2);
  const ryScale=r=>r/yr*(H-PAD*2);

  return (
    <svg viewBox={"0 0 "+W+" "+H} style={{width:'100%',height:H,background:'#070b10',borderRadius:6}}>
      <line x1={W/2} y1={0} x2={W/2} y2={H} stroke="#1e2938" strokeWidth={0.5}/>
      <line x1={0} y1={H/2} x2={W} y2={H/2} stroke="#1e2938" strokeWidth={0.5}/>
      {/* GMM 2σ covariance ellipses */}
      {ellipses&&ellipses.map(function(e,ci){
        if(!e) return null;
        return <ellipse key={'ell'+ci}
          cx={px(e.cx)} cy={py(e.cy)}
          rx={rxScale(e.rx)} ry={ryScale(e.ry)}
          fill="none"
          stroke={COLS[ci%COLS.length]}
          strokeWidth={1.2}
          strokeDasharray="4 3"
          opacity={0.45}/>;
      })}
      {coords.map((pt,i)=>(
        <circle key={i} cx={px(pt.x)} cy={py(pt.y)} r={2.2}
          fill={COLS[pt.k%COLS.length]} opacity={0.55}/>
      ))}
      {Array.from({length:k},function(_,ci){
        const mem=coords.filter(function(p){return p.k===ci;});
        if(!mem.length) return null;
        const cx=mem.reduce(function(s,p){return s+px(p.x);},0)/mem.length;
        const cy=mem.reduce(function(s,p){return s+py(p.y);},0)/mem.length;
        return <text key={ci} x={cx} y={cy} fontSize={10} fill={COLS[ci%COLS.length]}
          textAnchor="middle" fontWeight="700" opacity={0.9}>{ci+1}</text>;
      })}
      <text x={4} y={H-4} fontSize={8} fill="#374151">PC1 →</text>
      <text x={4} y={12} fontSize={8} fill="#374151">↑ PC2</text>
      <text x={W-4} y={H-4} fontSize={7} fill="#1e2938" textAnchor="end">GMM·BIC</text>
    </svg>
  );
}

function RadarChart({legs, cross, analogues}) {
  const W=300,H=300,CX=W/2,CY=H/2,R=110;
  const allLegs=[...legs,cross];
  const n=allLegs.length;
  const angle=i=>(2*Math.PI*i/n - Math.PI/2);
  const px=(v,i)=>CX+R*v*Math.cos(angle(i));
  const py=(v,i)=>CY+R*v*Math.sin(angle(i));

  // Grid rings
  const rings=[0.25,0.5,0.75,1.0];
  const ringPaths=rings.map(r=>{
    const pts=Array(n).fill(0).map((_,i)=>px(r,i)+','+py(r,i));
    return 'M'+pts.join('L')+'Z';
  });

  // Axes
  const axisLines=Array(n).fill(0).map((_,i)=>({
    x1:CX,y1:CY,x2:px(1,i),y2:py(1,i)
  }));

  // Current state polygon
  const currentPts=allLegs.map((l,i)=>px(l.val,i)+','+py(l.val,i));
  const currentPath='M'+currentPts.join('L')+'Z';

  // Analogue polygons
  const analoguePaths=(analogues||[]).map(function(a){
    const pts=a.vals.map((v,i)=>px(v,i)+','+py(v,i));
    return {path:'M'+pts.join('L')+'Z', col:a.col, label:a.label};
  });

  // Color by value
  function legColor(v) {
    if(v>=0.85) return '#ef4444';
    if(v>=0.65) return '#f97316';
    if(v>=0.45) return '#eab308';
    return '#60a5fa';
  }

  return (
    <svg viewBox={"0 0 "+W+" "+H} style={{width:'100%',maxWidth:280}}>
      {/* Background rings */}
      {ringPaths.map(function(d,ri){
        return <path key={ri} d={d} fill="none" stroke="#1e2938" strokeWidth={ri===3?0.8:0.4}/>;
      })}
      {rings.map(function(r,ri){
        return <text key={ri} x={CX+2} y={CY-R*r+3} fontSize={7} fill="#374151">{Math.round(r*100)}%</text>;
      })}
      {/* Axis lines */}
      {axisLines.map(function(ax,i){
        return <line key={i} x1={ax.x1} y1={ax.y1} x2={ax.x2} y2={ax.y2} stroke="#1e2938" strokeWidth={0.6}/>;
      })}
      {/* Analogue polygons (behind) */}
      {analoguePaths.map(function(a,ai){
        return <path key={ai} d={a.path} fill={a.col} fillOpacity={0.06} stroke={a.col} strokeWidth={1} strokeDasharray="3 2" opacity={0.5}/>;
      })}
      {/* Current state polygon */}
      <path d={currentPath} fill="rgba(239,68,68,0.15)" stroke="#ef4444" strokeWidth={2}/>
      {/* Dots at vertices */}
      {allLegs.map(function(l,i){
        return <circle key={i} cx={px(l.val,i)} cy={py(l.val,i)} r={4}
          fill={legColor(l.val)} stroke="#0a0e14" strokeWidth={1}/>;
      })}
      {/* Axis labels */}
      {allLegs.map(function(l,i){
        const ax=angle(i);
        const lx=CX+(R+18)*Math.cos(ax);
        const ly=CY+(R+18)*Math.sin(ax);
        const short=l.id==='l_cross'?'JPY':l.id.toUpperCase();
        return <text key={i} x={lx} y={ly+3} fontSize={8} fill="#9ca3af"
          textAnchor="middle">{short}</text>;
      })}
    </svg>
  );
}

      return 'rgb('+r+','+g+','+b+')';

      return 'rgb('+r+','+g+','+b+')';

          {/* Cells */}
          {legs.map(function(ra,ri){
            return legs.map(function(ca,ci){
              const v=matrix[ra]&&matrix[ra][ca]!==undefined?matrix[ra][ca]:0;

const LEG_LBL={l1:'War/Energy',l2:'Petrodollar',l3:'Priv Credit',l4:'Settlement',l5:'Food/Fert',l6:'Munitions',l7:'Semicon',l8:'Maritime',l9:'AI/Labor'};
const CLUSTER_COLS=['#3b82f6','#ef4444','#22c55e','#f97316','#a855f7','#ec4899'];
const EVT_LBL={BOJ_HIKE:'BOJ Hike 1.0%',FLASH_CRASH:'Flash Crash',BAB_MANDAB:'Bab al-Mandab',IRGC_MINES:'IRGC Mine Deploy',ISRAEL:'Israel Unilateral',CEASEFIRE:'Ceasefire Signal',CASCADE:'Credit Cascade',TETHER:'Tether De-peg',SPR_FLOOR:'SPR Heel Floor',GENIUS:'GENIUS Act Signed',SAUDI_PEG:'Saudi Peg Review',YANBU:'Yanbu Strike'};

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [res,setRes]=useState(null);
  const [running,setRunning]=useState(false);
  const [prog,setProg]=useState(0);
  const [nRuns,setNRuns]=useState(400);
  const [params,setParams]=useState({bojP:0.85,houth:1.0,cSup:1.0});

  const run=useCallback(async()=>{
    setRunning(true);setProg(0);setRes(null);
    const hists=[];
    const CHUNK=40;
    for(let i=0;i<nRuns;i++){
      const r=mkRng(42+i*7919);
      hists.push(simRun(params,r));
      if(i%CHUNK===CHUNK-1){
        setProg((i+1)/nRuns);
        await new Promise(resolve=>setTimeout(resolve,0));
      }
    }
    setProg(1);
    setRes(aggregate(hists));
    setRunning(false);
  },[nRuns,params]);

  useEffect(()=>{run();},[]);

  const crashP=res?res.crashWks.length/res.N:0;
  const maxCrash=res?Math.max(...res.crashDist,1):1;

  return (
    <div className="app">

      {/* Header */}
      <div className="hdr">
        <div>
          <div className="hdr-title">⬡ God's Eye — Full Convergence Strategic Intelligence Engine v1.0</div>
          <div className="hdr-sub">Agent-Based Simulation · Monte Carlo · GMM Regime Discovery (BIC) · Jun 8 – Dec 31, 2026</div>
        </div>
        <div className="badges">
          <span className="badge b-red">COMPOSITE 91%</span>
          <span className="badge b-ora">CB-D/E</span>
          {res&&<span className="badge b-red">FLASH CRASH {(crashP*100).toFixed(0)}%</span>}
          <span className="badge b-yel">BOJ WINDOW JUN 16-17</span>
          <span className="badge b-blu">LEG 8 → 89% (HOUTHI BLOCKADE)</span>
          <span className="badge b-grn">SPR FLOOR ~JUL 1</span>
        </div>
        <button className="rbtn" onClick={run} disabled={running}>
          {running?'RUNNING '+Math.round(prog*100)+'%':'▶ RUN '+nRuns+' SIMULATIONS'}
        </button>
      </div>

      {/* Progress */}
      {running&&<div className="prog-wrap"><div className="prog-fill" style={{width:(prog*100)+'%'}}/></div>}

      {/* Controls */}
      <div className="ctrls">
        <div className="ctrl">
          <label>Simulations <span>{nRuns}</span></label>
          <input type="range" min="100" max="1500" step="100" value={nRuns} onChange={e=>setNRuns(+e.target.value)}/>
        </div>
        <div className="ctrl">
          <label>BOJ Hike Prob <span>{Math.round(params.bojP*100)}%</span></label>
          <input type="range" min="0.2" max="1" step="0.05" value={params.bojP}
            onChange={e=>setParams(p=>Object.assign({},p,{bojP:+e.target.value}))}/>
        </div>
        <div className="ctrl">
          <label>Houthi Escalation <span>{params.houth.toFixed(1)}×</span></label>
          <input type="range" min="0.2" max="3" step="0.1" value={params.houth}
            onChange={e=>setParams(p=>Object.assign({},p,{houth:+e.target.value}))}/>
        </div>
        <div className="ctrl">
          <label>Ceasefire Suppression <span>{params.cSup.toFixed(1)}×</span></label>
          <input type="range" min="0.1" max="2" step="0.1" value={params.cSup}
            onChange={e=>setParams(p=>Object.assign({},p,{cSup:+e.target.value}))}/>
        </div>
      </div>

      {!res&&!running&&<div style={{textAlign:'center',padding:'60px',color:'#374151'}}>Initializing...</div>}

      {res&&(
        <React.Fragment>

          {/* Row 1: Scenarios + PCA */}
          <div className="g2">
            <div className="card">
              <div className="ctitle"><span className="dot"/>Scenario Probability Distribution — {res.N} Monte Carlo Runs</div>
              <SvgAreaChart data={res.tl} keys={['pA','pB','pC','pD','pE']} colors={SCEN_COLORS} height={200}/>
              <div style={{display:'flex',gap:10,flexWrap:'wrap',marginTop:10}}>
                {['A','B','C','D','E'].map((s,i)=>(
                  <div key={s} style={{display:'flex',alignItems:'center',gap:4}}>
                    <div style={{width:10,height:10,borderRadius:2,background:SCEN_COLORS[i]}}/>
                    <span style={{fontSize:10,color:'#6b7280'}}>{s}: <b style={{color:'#e2e8f0'}}>{(res.fScen[s]*100).toFixed(1)}%</b></span>
                  </div>
                ))}
              </div>
              <div style={{marginTop:10}}>
                {['A','B','C','D','E'].map(function(s,i){
                  const p=res.fScen[s];
                  const ci=res.fCI[s];
                  return (
                    <div key={s} className="sbar-row">
                      <span className="sbar-lbl">{s}</span>
                      <span className="sbar-name">{SCEN_LABELS[s]}</span>
                      <div className="sbar-track" style={{position:'relative'}}>
                        {/* CI band */}
                        {ci&&<div style={{position:'absolute',top:0,bottom:0,left:(ci.lo*100)+'%',width:((ci.hi-ci.lo)*100)+'%',background:SCEN_COLORS[i],opacity:.18,borderRadius:3}}/>}
                        <div className="sbar-fill" style={{width:(p*100)+'%',background:SCEN_COLORS[i]}}>
                          <span className="sbar-pct">{(p*100).toFixed(1)}%</span>
                        </div>
                      </div>
                      {ci&&<span style={{fontSize:9,color:'#374151',flexShrink:0,width:80}}>[{(ci.lo*100).toFixed(0)}–{(ci.hi*100).toFixed(0)}%]</span>}
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="card">
              <div className="ctitle">
                <span className="dot dot-b"/>
                GMM Regime Discovery — K={res.bestK} (BIC-Selected, Not Pre-Built)
                <span style={{marginLeft:'auto',fontSize:9,color:'#374151'}}>
                  BIC: {Object.entries(res.bicMap||{}).map(function(e){return 'k'+e[0]+'='+e[1];}).join(' · ')}
                  {' · '}sil={res.sil!=null?(+res.sil).toFixed(3):'—'}
                  {res.uncertainty!=null&&(' · unc='+res.uncertainty.toFixed(3))}
                </span>
              </div>
              <PcaScatter coords={res.pcaCoords} k={res.bestK} ellipses={res.ellipses}/>
              <div style={{fontSize:9,color:'#374151',marginTop:4,marginBottom:8}}>
                PCA 2D projection · GMM soft assignments · ellipses = 2σ component boundaries · BIC selects K
              </div>
              <div className="rcards">
                {Object.entries(res.regimes).map(function(entry){
                  const ci=entry[0];const r=entry[1];
                  const col=CLUSTER_COLS[+ci%CLUSTER_COLS.length];
                  const exp=REGIME_EXPLANATIONS[r.label]||'Emergent regime identified by GMM (soft probabilistic clustering) on simulation run feature vectors. BIC criterion selected K.';
                  return (
                    <div key={ci} className="rcard">
                      <div className="rtitle" style={{color:col}}>
                        Regime {+ci+1} — {(r.pct*100).toFixed(0)}% of runs
                        <span style={{fontSize:8,color:'#374151',marginLeft:6}}>w={r.gmmWeight!=null?r.gmmWeight.toFixed(2):'?'}</span>
                      </div>
                      <div style={{fontSize:9,color:'#6b7280',fontStyle:'italic',marginBottom:4}}>{r.label}</div>
                      <div className="rstat">Brent ${r.avgBrent.toFixed(0)} · VIX {r.avgVix.toFixed(0)} · Yield {r.avgYld.toFixed(2)}%</div>
                      <div className="rtags">
                        {r.flashR>0.4&&<span className="rtag rtag-hot">Flash crash {(r.flashR*100).toFixed(0)}%</span>}
                        {r.babR>0.25&&<span className="rtag rtag-hot">Bab {(r.babR*100).toFixed(0)}%</span>}
                        {r.mineR>0.25&&<span className="rtag">Mines {(r.mineR*100).toFixed(0)}%</span>}
                        {r.cfR>0.45&&<span className="rtag">Ceasefire {(r.cfR*100).toFixed(0)}%</span>}
                        {r.casR>0.35&&<span className="rtag rtag-hot">Cascade {(r.casR*100).toFixed(0)}%</span>}
                        {r.sauR>0.20&&<span className="rtag">Saudi peg {(r.sauR*100).toFixed(0)}%</span>}
                        {r.meanResp!=null&&<span className="rtag" style={{opacity:.7}}>responsibility {r.meanResp.toFixed(2)}</span>}
                      </div>
                      <div className="regime-exp">{exp}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* Row 2: Legs + Events */}
          <div className="g2">
            <div className="card">
              <div className="ctitle"><span className="dot dot-o"/>9-Leg Convergence Score Evolution</div>
              <SvgLineChart data={res.tl} keys={['l1','l2','l3','l4','l5','l6','l7','l8','l9']}
                colors={LEG_COLS} height={170} domainMin={0.2} domainMax={1.0}/>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:8}}>
                {['l1','l2','l3','l4','l5','l6','l7','l8','l9'].map(function(l,i){
                  return (
                    <div key={l} style={{display:'flex',alignItems:'center',gap:3}}>
                      <div style={{width:10,height:2,background:LEG_COLS[i]}}/>
                      <span style={{fontSize:9,color:'#6b7280'}}>{LEG_LBL[l]}</span>
                    </div>
                  );
                })}
              </div>
            </div>
            <div className="card">
              <div className="ctitle"><span className="dot dot-p"/>Event Frequency — {res.N} Simulations</div>
              <div className="evt-list">
                {Object.entries(res.evtF).sort(function(a,b){return b[1]-a[1];}).map(function(entry){
                  const evt=entry[0];const f=entry[1];
                  const col=f>0.8?'#ef4444':f>0.5?'#f97316':f>0.25?'#eab308':'#3b82f6';
                  return (
                    <div key={evt} className="ebar-row">
                      <div className="ebar-name">{EVT_LBL[evt]||evt}</div>
                      <div className="ebar-track">
                        <div className="ebar-fill" style={{width:(f*100)+'%',background:col,opacity:.75}}/>
                      </div>
                      <div className="ebar-pct">{(f*100).toFixed(0)}%</div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>

          {/* Row 3: Macro + Flash crash timing */}
          <div className="g2">
            <div className="card">
              <div className="ctitle"><span className="dot dot-b"/>Mean Brent + VIX Trajectories</div>
              <SvgLineChart data={res.tl} keys={['brent','vix']}
                colors={['#f97316','#ef4444']} height={150} domainMin={15} domainMax={210}/>
              <div style={{display:'flex',gap:12,marginTop:6}}>
                <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:12,height:2,background:'#f97316'}}/><span style={{fontSize:10,color:'#6b7280'}}>Brent ($/bbl)</span></div>
                <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:12,height:2,background:'#ef4444'}}/><span style={{fontSize:10,color:'#6b7280'}}>VIX</span></div>
              </div>
            </div>
            <div className="card">
              <div className="ctitle">
                <span className="dot"/>Flash Crash Timing Distribution
                <span style={{marginLeft:'auto',fontSize:9,color:'#4b5563'}}>
                  {res.crashWks.length>0
                    ?((res.crashWks.length/res.N*100).toFixed(0))+'% probability · mean wk '+(res.crashWks.reduce(function(a,b){return a+b;},0)/res.crashWks.length).toFixed(1)
                    :'No flash crash events'}
                </span>
              </div>
              <div style={{display:'flex',gap:2,alignItems:'flex-end',height:90,marginBottom:8}}>
                {res.crashDist.map(function(v,w){
                  return (
                    <div key={w} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',height:'100%',justifyContent:'flex-end'}}>
                      <div style={{width:'100%',background:v>0?'#ef4444':'transparent',height:v>0?(v/maxCrash*85)+'%':'0',borderRadius:'2px 2px 0 0',opacity:.8,minHeight:v>0?2:0}}/>
                    </div>
                  );
                })}
              </div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'#374151'}}>
                <span>Wk 0 Jun 8</span><span>Wk 15 Sep 28</span><span>Wk 29 Dec 29</span>
              </div>
              {res.crashWks.length>0&&(
                <div style={{marginTop:8,padding:'8px 10px',background:'rgba(239,68,68,.07)',border:'1px solid rgba(239,68,68,.2)',borderRadius:4,fontSize:10,color:'#fca5a5'}}>
                  BOJ hike → carry unwind → flash crash chain · median week {res.crashWks.sort(function(a,b){return a-b;})[Math.floor(res.crashWks.length/2)]}
                  {' '}(~{['Jun','Jul','Aug','Sep'][Math.floor((res.crashWks.sort(function(a,b){return a-b;})[Math.floor(res.crashWks.length/2)]*7)/90)||0]} 2026)
                </div>
              )}
            </div>
          </div>

          {/* L(t) State Vector Panel */}
          <StateVectorPanel/>

          {/* Correlation heatmap */}
          <CorrelationHeatmap matrix={res.corrMatrix}/>

          {/* Actor Registry */}
          <ActorRegistry/>

          <div className="foot">
            God's Eye v1.0 · {res.N.toLocaleString()} Monte Carlo runs · {res.bestK} emergent regimes discovered via GMM (BIC model selection) ·
            BIC by K: {res.bicMap?Object.entries(res.bicMap).map(function(e){return 'k'+e[0]+'='+e[1];}).join(', '):'—'} ·
            Regimes are emergent from simulation data — not pre-built scenario taxonomy
          </div>

        </React.Fragment>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
